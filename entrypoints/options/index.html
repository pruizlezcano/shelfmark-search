<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shelfmark Settings</title>
  </head>
  <body>
    <div id="app">
      <div class="container">
        <div class="field">
          <h1>Shelfmark Settings</h1>
          <label for="baseUrl">Shelfmark Base URL</label>
          <input
            type="url"
            id="baseUrl"
            placeholder="https://shelfmark.example.com"
            spellcheck="false"
          />
          <p class="help-text">The full URL of your Shelfmark instance.</p>
        </div>
        <div class="actions">
          <button id="save" type="button">Save Settings</button>
        </div>
        <p id="status"></p>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
